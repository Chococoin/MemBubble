<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MemBubble — Bubble Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            min-height: 100vh;
        }
        h1 { font-size: 20px; margin-bottom: 4px; }
        .subtitle { color: #808090; font-size: 12px; margin-bottom: 36px; }

        .panel {
            display: flex;
            gap: 48px;
            align-items: flex-start;
        }
        .channel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .channel-label {
            font-size: 11px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; color: #808090;
        }

        /* Bubble container */
        .bubble-wrap {
            width: 100px;
            height: 100px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Pearl bubble via CSS */
        .pearl {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .pearl-body {
            position: absolute; inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%,
                rgba(60,60,60,0.6),
                rgba(30,30,30,0.5) 50%,
                rgba(15,15,15,0.4));
        }
        .pearl-fill {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            border-radius: 0 0 50% 50%;
            transition: height 0.5s ease, background 0.5s ease;
        }
        .pearl-fill.tall {
            border-radius: 50%;
        }
        .pearl-sheen {
            position: absolute; inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%,
                rgba(255,255,255,0.08),
                rgba(255,255,255,0.02) 40%,
                transparent 60%);
        }
        .pearl-highlight {
            position: absolute;
            width: 28px; height: 16px;
            top: 12px; left: 18px;
            border-radius: 50%;
            background: radial-gradient(ellipse at 50% 50%,
                rgba(255,255,255,0.55),
                rgba(255,255,255,0.1) 50%,
                transparent 70%);
        }
        .pearl-pinpoint {
            position: absolute;
            width: 8px; height: 6px;
            top: 10px; left: 24px;
            border-radius: 50%;
            background: radial-gradient(ellipse at 50% 50%,
                rgba(255,255,255,0.75),
                transparent 70%);
        }
        .pearl-rim {
            position: absolute; inset: 1px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-image: conic-gradient(
                from -40deg,
                rgba(255,255,255,0.25),
                rgba(255,255,255,0.05) 60deg,
                transparent 120deg,
                transparent 240deg,
                rgba(255,255,255,0.08) 300deg,
                rgba(255,255,255,0.25) 360deg
            ) 1;
        }
        .pearl-rim2 {
            position: absolute; inset: 2px;
            border-radius: 50%;
            box-shadow: inset 0 -2px 6px rgba(255,255,255,0.04);
        }
        .pearl-bottom {
            position: absolute;
            width: 24px; height: 8px;
            bottom: 10px;
            left: 50%; transform: translateX(-50%);
            border-radius: 50%;
            background: radial-gradient(ellipse,
                rgba(255,255,255,0.07),
                transparent 70%);
        }
        .pearl-text {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 800;
            font-family: -apple-system, 'SF Pro Rounded', sans-serif;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            transition: color 0.5s ease;
        }

        /* Knob */
        .knob-area { position: relative; width: 100px; height: 100px; }
        .knob-canvas { cursor: pointer; }

        .value-display {
            font-size: 14px; font-weight: 700;
            font-family: 'SF Mono', monospace;
            transition: color 0.3s ease;
        }

        /* Color legend */
        .legend {
            margin-top: 40px;
            display: flex; gap: 24px;
        }
        .legend-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; color: #808090;
        }
        .legend-dot {
            width: 10px; height: 10px; border-radius: 50%;
        }
    </style>
</head>
<body>
    <h1>Bubble Color Preview</h1>
    <p class="subtitle">Turn the knobs to see how bubbles respond from 0% to 100%</p>

    <div class="panel">
        <!-- Memory Pressure -->
        <div class="channel">
            <span class="channel-label">Pressure</span>
            <div class="bubble-wrap">
                <div class="pearl" id="memPearl">
                    <div class="pearl-body"></div>
                    <div class="pearl-fill" id="memFill"></div>
                    <div class="pearl-sheen"></div>
                    <div class="pearl-highlight"></div>
                    <div class="pearl-pinpoint"></div>
                    <div class="pearl-rim2"></div>
                    <div class="pearl-bottom"></div>
                    <div class="pearl-text" id="memText">0%</div>
                </div>
            </div>
            <canvas class="knob-canvas" id="memKnob" width="100" height="100"></canvas>
            <span class="value-display" id="memVal" style="color:#4ade80">0%</span>
        </div>

        <!-- Activity -->
        <div class="channel">
            <span class="channel-label">Activity</span>
            <div class="bubble-wrap">
                <div class="pearl" id="actPearl">
                    <div class="pearl-body"></div>
                    <div class="pearl-fill" id="actFill"></div>
                    <div class="pearl-sheen"></div>
                    <div class="pearl-highlight"></div>
                    <div class="pearl-pinpoint"></div>
                    <div class="pearl-rim2"></div>
                    <div class="pearl-bottom"></div>
                    <div class="pearl-text" id="actText">0%</div>
                </div>
            </div>
            <canvas class="knob-canvas" id="actKnob" width="100" height="100"></canvas>
            <span class="value-display" id="actVal" style="color:#2dd4bf">0%</span>
        </div>

        <!-- CPU -->
        <div class="channel">
            <span class="channel-label">CPU</span>
            <div class="bubble-wrap">
                <div class="pearl" id="cpuPearl">
                    <div class="pearl-body"></div>
                    <div class="pearl-fill" id="cpuFill"></div>
                    <div class="pearl-sheen"></div>
                    <div class="pearl-highlight"></div>
                    <div class="pearl-pinpoint"></div>
                    <div class="pearl-rim2"></div>
                    <div class="pearl-bottom"></div>
                    <div class="pearl-text" id="cpuText">0%</div>
                </div>
            </div>
            <canvas class="knob-canvas" id="cpuKnob" width="100" height="100"></canvas>
            <span class="value-display" id="cpuVal" style="color:#22d3ee">0%</span>
        </div>
    </div>

    <!-- Legend -->
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div> Green (Normal)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#facc15"></div> Yellow (Elevated)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fb923c"></div> Orange (High)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div> Red (Critical)</div>
    </div>

    <div class="legend" style="margin-top: 12px;">
        <div class="legend-item"><div class="legend-dot" style="background:#2dd4bf"></div> Mint</div>
        <div class="legend-item"><div class="legend-dot" style="background:#14b8a6"></div> Teal</div>
        <div class="legend-item"><div class="legend-dot" style="background:#6366f1"></div> Indigo</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ec4899"></div> Pink</div>
        <div style="width:32px"></div>
        <div class="legend-item"><div class="legend-dot" style="background:#22d3ee"></div> Cyan</div>
        <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> Blue</div>
        <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div> Purple</div>
    </div>

    <script>
        // Color functions matching Swift code
        function pressureColor(pct) {
            if (pct < 50) return '#4ade80';  // green
            if (pct < 70) return '#facc15';  // yellow
            if (pct < 85) return '#fb923c';  // orange
            return '#f87171';                 // red
        }

        function activityColor(pct) {
            if (pct < 30) return '#2dd4bf';  // mint
            if (pct < 55) return '#14b8a6';  // teal
            if (pct < 80) return '#6366f1';  // indigo
            return '#ec4899';                 // pink
        }

        function cpuColor(pct) {
            if (pct < 40) return '#22d3ee';  // cyan
            if (pct < 65) return '#3b82f6';  // blue
            if (pct < 85) return '#a855f7';  // purple
            return '#f87171';                 // red
        }

        function hexToRGBA(hex, alpha) {
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        function updateBubble(fillId, textId, pct, colorFn, minFill = 0) {
            const fill = document.getElementById(fillId);
            const text = document.getElementById(textId);
            const color = colorFn(pct);
            const fillPct = Math.max(minFill, pct);

            fill.style.height = fillPct + '%';
            fill.style.background = `linear-gradient(to top,
                ${hexToRGBA(color, 0.6)},
                ${hexToRGBA(color, 0.35)} 40%,
                ${hexToRGBA(color, 0.15)} 70%,
                transparent)`;

            if (fillPct > 60) {
                fill.classList.add('tall');
            } else {
                fill.classList.remove('tall');
            }

            text.textContent = Math.round(pct) + '%';
            text.style.color = color;
        }

        // Knob class
        class Knob {
            constructor(canvasId, color, onChange) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.color = color;
                this.value = 0;
                this.onChange = onChange;
                this.dragging = false;
                this.cx = 50; this.cy = 50; this.r = 32;

                this.canvas.addEventListener('mousedown', () => this.dragging = true);
                window.addEventListener('mouseup', () => this.dragging = false);
                this.canvas.addEventListener('mousemove', (e) => { if (this.dragging) this.update(e); });
                this.canvas.addEventListener('click', (e) => this.update(e));
                this.draw();
            }

            update(e) {
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left - this.cx;
                const y = e.clientY - rect.top - this.cy;
                let angle = Math.atan2(x, -y) * 180 / Math.PI;
                angle = Math.max(-135, Math.min(135, angle));
                this.value = (angle + 135) / 270;
                this.draw();
                this.onChange(this.value);
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, 100, 100);
                const cx = this.cx, cy = this.cy, r = this.r;

                // Track
                ctx.beginPath();
                ctx.arc(cx, cy, r + 5, Math.PI * 0.75, Math.PI * 2.25);
                ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.stroke();

                // Active arc
                ctx.beginPath();
                ctx.arc(cx, cy, r + 5, Math.PI * 0.75, Math.PI * 0.75 + Math.PI * 1.5 * this.value);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.stroke();

                // Body
                const grad = ctx.createRadialGradient(cx - 4, cy - 4, 0, cx, cy, r);
                grad.addColorStop(0, '#484848');
                grad.addColorStop(0.6, '#2a2a2a');
                grad.addColorStop(1, '#1a1a1a');
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fillStyle = grad; ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.lineWidth = 1; ctx.stroke();

                // Indicator
                const a = (-135 + 270 * this.value) * Math.PI / 180 - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(a) * 10, cy + Math.sin(a) * 10);
                ctx.lineTo(cx + Math.cos(a) * (r - 4), cy + Math.sin(a) * (r - 4));
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.stroke();

                // Center
                ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#111'; ctx.fill();
            }
        }

        // Init
        const memK = new Knob('memKnob', '#4ade80', v => {
            const pct = v * 100;
            updateBubble('memFill', 'memText', pct, pressureColor);
            document.getElementById('memVal').textContent = Math.round(pct) + '%';
            document.getElementById('memVal').style.color = pressureColor(pct);
        });

        const actK = new Knob('actKnob', '#2dd4bf', v => {
            const pct = v * 100;
            updateBubble('actFill', 'actText', pct, activityColor, 15);
            document.getElementById('actVal').textContent = Math.round(pct) + '%';
            document.getElementById('actVal').style.color = activityColor(pct);
        });

        const cpuK = new Knob('cpuKnob', '#22d3ee', v => {
            const pct = v * 100;
            updateBubble('cpuFill', 'cpuText', pct, cpuColor);
            document.getElementById('cpuVal').textContent = Math.round(pct) + '%';
            document.getElementById('cpuVal').style.color = cpuColor(pct);
        });

        // Init bubbles at 0
        updateBubble('memFill', 'memText', 0, pressureColor);
        updateBubble('actFill', 'actText', 0, activityColor, 15);
        updateBubble('cpuFill', 'cpuText', 0, cpuColor);
    </script>
</body>
</html>
